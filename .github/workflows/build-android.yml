name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Этот шаг подтянет нужный Gradle и настроит кэш, чтобы собиралось быстрее
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Переходим в папку android, даем права на запуск gradlew и компилируем APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # Сохраняем готовый APK файл в артефакты GitHub Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-client-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
