name: Init skeleton

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create branch and add skeleton files
        run: |
          set -e
          BRANCH="init-skeleton"
          # Create or reset branch locally based on main
          git fetch origin main:refs/remotes/origin/main
          if git show-ref --verify --quiet refs/heads/$BRANCH; then
            git branch -D $BRANCH || true
          fi
          git checkout -b $BRANCH origin/main

          # README
          cat > README.md <<'EOF'
# music-client

Этот репозиторий содержит начальный скелет Android‑клиента для платформы личных треков и минимальные инструкции для загрузки треков напрямую в репозиторий через GitHub API.

Коротко:
- Хранение аудио: Git LFS (рекомендуется). GitHub запрещает файлы >100MB.
- Загрузка: из приложения напрямую в репозиторий через GitHub API (Personal Access Token / OAuth token). Нет отдельного сервера.
- В приложении используется одна ветка для треков: "tracks" (все загрузки идут туда). Платформенные (твои) треки помещаются в owner/, пользовательские в users/<username>/.

Лицензия: MIT
EOF

          # .gitattributes
          cat > .gitattributes <<'EOF'
*.mp3 filter=lfs diff=lfs merge=lfs -text
*.wav filter=lfs diff=lfs merge=lfs -text
EOF

          # .lfsconfig (uses GITHUB_REPOSITORY env during run)
          cat > .lfsconfig <<EOF
[lfs]
	url = https://github.com/${GITHUB_REPOSITORY}.git/info/lfs
EOF

          # .gitignore
          cat > .gitignore <<'EOF'
# Gradle caches
.gradle/
build/
**/build/

# Android Studio
.idea/
*.iml

# Local properties
local.properties

# Keystore
*.jks

# Other
*.log
EOF

          # Minimal Android CI workflow (separate file)
          mkdir -p .github/workflows
          cat > .github/workflows/android-ci.yml <<'EOF'
name: Android CI

on:
  push:
    branches: [ main, init-skeleton ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Debug (if android-client exists)
        run: |
          if [ -d android-client ] && [ -f android-client/gradlew ]; then
            cd android-client
            ./gradlew assembleDebug --no-daemon
          else
            echo "android-client not present yet; nothing to build."
          fi
EOF

          # Minimal android-client skeleton (short files to avoid huge payloads)
          mkdir -p android-client/app/src/main/java/com/winshop/musicclient/player
          mkdir -p android-client/app/src/main/java/com/winshop/musicclient/data
          mkdir -p android-client/app/src/main/res

          cat > android-client/settings.gradle <<'EOF'
rootProject.name = "music-client"
include ":app"
EOF

          cat > android-client/build.gradle <<'EOF'
// Top-level build file placeholder
buildscript {
  ext.kotlin_version = '1.9.10'
  repositories { google(); mavenCentral() }
}
EOF

          cat > android-client/app/src/main/AndroidManifest.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest package="com.winshop.musicclient"
    xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET" />
    <application android:allowBackup="true" android:label="music-client" >
        <activity android:name=".MainActivity" android:exported="true">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
        <service android:name=".player.PlayerService" android:exported="false" />
    </application>
</manifest>
EOF

          cat > android-client/app/src/main/java/com/winshop/musicclient/MainActivity.kt <<'EOF'
package com.winshop.musicclient

import android.os.Bundle
import androidx.activity.ComponentActivity
import androidx.activity.compose.setContent
import androidx.compose.material.Text
import androidx.compose.runtime.Composable

class MainActivity : ComponentActivity() {
  override fun onCreate(savedInstanceState: Bundle?) {
    super.onCreate(savedInstanceState)
    setContent { AppRoot() }
  }
}

@Composable
fun AppRoot() { Text("Music Client (skeleton)") }
EOF

          cat > android-client/app/src/main/java/com/winshop/musicclient/player/PlayerService.kt <<'EOF'
package com.winshop.musicclient.player

import android.app.Service
import android.content.Intent
import android.os.IBinder
import com.google.android.exoplayer2.SimpleExoPlayer

class PlayerService : Service() {
  private var player: SimpleExoPlayer? = null
  override fun onCreate() { super.onCreate(); player = SimpleExoPlayer.Builder(this).build() }
  override fun onDestroy() { player?.release(); player = null; super.onDestroy() }
  override fun onBind(intent: Intent?): IBinder? = null
}
EOF

          # Commit & push to branch
          git add .
          git commit -m "Init: add skeleton files (via workflow)" || echo "No changes to commit"
          git push origin $BRANCH --force

      - name: Show result
        run: |
          echo "Branch pushed (if created). List branches below:"
          git ls-remote --heads origin
