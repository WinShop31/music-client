name: Initialize Skeleton

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init-skeleton:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git and Create Skeleton
        run: |
          set -euo pipefail

          # Настройка Git-инфтерфейса для коммита от лица GitHub Actions Bot
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Корректное определение дефолтной ветки репозитория
          DEFAULT_BRANCH=$(git rev-parse --abbrev-ref origin/HEAD 2>/dev/null | sed 's|origin/||' || echo "main")
          
          # Переключение/создание ветки init-skeleton на основе дефолтной (или текущей локальной)
          git checkout -B init-skeleton "origin/$DEFAULT_BRANCH" || git checkout -B init-skeleton

          # Создание необходимых директорий
          mkdir -p .github/workflows
          mkdir -p android-client/app/src/main/java/com/winshop/musicclient

          # Генерация README.md
          cat << 'EOF' > README.md
# music-client

Этот репозиторий содержит начальный скелет Android‑клиента для личных треков и инструкции.
- Хранение аудио: рекомендуется Git LFS.
- Загрузка: клиент загружает треки в ветку `tracks` через GitHub API.
- Лицензия: MIT
EOF

          # Генерация .gitattributes
          cat << 'EOF' > .gitattributes
*.mp3 filter=lfs diff=lfs merge=lfs -text
*.wav filter=lfs diff=lfs merge=lfs -text
EOF

          # Генерация .lfsconfig с использованием переменной окружения рантайма (без конфликтов с синтаксисом GitHub Actions)
          cat << EOF > .lfsconfig
[lfs]
    url = https://github.com/${GITHUB_REPOSITORY}.git/info/lfs
EOF

          # Генерация минимального .gitignore для Android/Gradle
          cat << 'EOF' > .gitignore
.gradle/
build/
capture/
*.apk
*.iml
.idea/
local.properties
.DS_Store
EOF

          # Генерация независимого android-ci.yml (не падает, если папка пуста)
          cat << 'EOF' > .github/workflows/android-ci.yml
name: Android CI

on:
  push:
    branches:
      - main
      - init-skeleton

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          if [ -d "android-client" ]; then
            cd android-client
            if [ -f "gradlew" ]; then
              chmod +x gradlew
              ./gradlew assembleDebug
            else
              echo "gradlew not found, skipping build."
            fi
          else
            echo "android-client directory not found, skipping build."
          fi
EOF

          # Генерация settings.gradle
          cat << 'EOF' > android-client/settings.gradle
rootProject.name = "music-client"
include ":app"
EOF

          # Генерация MainActivity.kt (базовый рабочий Compose-шаблон)
          cat << 'EOF' > android-client/app/src/main/java/com/winshop/musicclient/MainActivity.kt
package com.winshop.musicclient

import android.os.Bundle
import androidx.activity.ComponentActivity
import androidx.activity.compose.setContent
import androidx.compose.material3.Text

class MainActivity : ComponentActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContent {
            Text(text = "Music Client Skeleton")
        }
    }
}
EOF

          # Индексация, создание коммита и принудительный пуш в ветку init-skeleton
          git add README.md .gitattributes .lfsconfig .gitignore .github/workflows/android-ci.yml android-client/
          git commit -m "Init: add skeleton files (via workflow)"
          git push origin HEAD:init-skeleton --force

          # Вывод списка удаленных веток для проверки
          git ls-remote --heads origin
