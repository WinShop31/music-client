name: Init skeleton

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Create branch and files
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'init-skeleton';

            // get default branch sha
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.default_branch;
            const { data: refData } = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
            const sha = refData.object.sha;

            // create branch if not exists
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha });
              console.log('Branch created:', branch);
            } catch (e) {
              if (e.status === 422) {
                console.log('Branch already exists:', branch);
              } else {
                throw e;
              }
            }

            // helper to create or update a file in branch
            async function createOrUpdate(path, contentText, message) {
              const content = Buffer.from(contentText).toString('base64');
              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner, repo, path,
                  message,
                  content,
                  branch,
                });
                console.log('Created', path);
              } catch (err) {
                if (err.status === 422 || err.status === 409) {
                  // file exists — update
                  const existing = await github.rest.repos.getContent({ owner, repo, path, ref: branch });
                  await github.rest.repos.createOrUpdateFileContents({
                    owner, repo, path,
                    message: message + ' (update)',
                    content,
                    branch,
                    sha: existing.data.sha
                  });
                  console.log('Updated', path);
                } else {
                  throw err;
                }
              }
            }

            // Files to create (shortened, can be extended)
            const files = {
              'README.md': `# music-client

Этот репозиторий содержит начальный скелет Android‑клиента для платформы личных треков и минимальные инструкции для загрузки треков напрямую в репозиторий через GitHub API.

Коротко:
- Хранение аудио: Git LFS (рекомендуется). GitHub запрещает файлы >100MB.
- Загрузка: из приложения напрямую в репозиторий через GitHub API (Personal Access Token / OAuth token) или через Actions. Нет отдельного сервера.
- В приложении используется одна ветка для треков: \"tracks\" (все загрузки идут туда). Платформенные (твои) треки помещаются в owner/, пользовательские в users/<username>/.

Лицензия: MIT
`,
              '.gitattributes': `*.mp3 filter=lfs diff=lfs merge=lfs -text
*.wav filter=lfs diff=lfs merge=lfs -text
`,
