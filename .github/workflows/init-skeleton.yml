name: Init skeleton

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout using PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SKELETON_PAT }}
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "skeleton-bot"
          git config user.email "skeleton-bot@users.noreply.github.com"

      - name: Create branch and add files
        env:
          BRANCH: init-skeleton
          REPO: ${{ github.repository }}
        run: |
          set -e

          # fetch main (if exists)
          git fetch origin main:refs/remotes/origin/main || true

          # create/reset branch from origin/main (or from current HEAD)
          if git show-ref --verify --quiet refs/heads/$BRANCH; then
            git branch -D $BRANCH || true
          fi
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git checkout -b $BRANCH origin/main || git checkout -b $BRANCH
          else
            git checkout -b $BRANCH
          fi

          # README
          cat > README.md <<'README'
# music-client

Этот репозиторий содержит начальный скелет Android‑клиента для платформы личных треков и минимальные инструкции для загрузки треков напрямую в репозиторий через GitHub API.

Коротко:
- Хранение аудио: Git LFS (рекомендуется). GitHub запрещает файлы >100MB.
- Загрузка: из приложения напрямую в репозиторий через GitHub API (Personal Access Token / OAuth token).
- В приложении используется одна ветка для треков: "tracks".

Лицензия: MIT
README

          # .gitattributes
          cat > .gitattributes <<'ATTR'
*.mp3 filter=lfs diff=lfs merge=lfs -text
*.wav filter=lfs diff=lfs merge=lfs -text
ATTR

          # .lfsconfig (uses repo env)
          cat > .lfsconfig <<LFS
[lfs]
    url = https://github.com/${REPO}.git/info/lfs
LFS

          # .gitignore
          cat > .gitignore <<'GITIGNORE'
.gradle/
build/
**/build/
.idea/
*.iml
local.properties
*.jks
*.log
GITIGNORE

          # Minimal android CI workflow
          mkdir -p .github/workflows
          cat > .github/workflows/android-ci.yml <<'CI'
name: Android CI

on:
  push:
    branches: [ main, init-skeleton ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Build (if android-client present)
        run: |
          if [ -d android-client ] && [ -f android-client/gradlew ]; then
            cd android-client
            ./gradlew assembleDebug --no-daemon
          else
            echo "No android-client found."
          fi
CI

          # Minimal android-client skeleton (small files)
          mkdir -p android-client/app/src/main/java/com/winshop/musicclient
          cat > android-client/settings.gradle <<'SETTINGS'
rootProject.name = "music-client"
include ":app"
SETTINGS

          cat > android-client/app/src/main/java/com/winshop/musicclient/MainActivity.kt <<'ACT'
package com.winshop.musicclient

import android.os.Bundle
import androidx.activity.ComponentActivity
import androidx.activity.compose.setContent
import androidx.compose.material.Text
import androidx.compose.runtime.Composable

class MainActivity : ComponentActivity() {
  override fun onCreate(savedInstanceState: Bundle?) {
    super.onCreate(savedInstanceState)
    setContent { AppRoot() }
  }
}

@Composable
fun AppRoot() { Text("Music Client (skeleton)") }
ACT

          # commit & push
          git add .
          git commit -m "Init: add skeleton files (via workflow)" || true
          git push origin $BRANCH --force

      - name: Show branches
        run: |
          echo "Branches on origin:"
          git ls-remote --heads origin
