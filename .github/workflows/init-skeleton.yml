              'android-client/app/src/main/java/com/winshop/musicclient/github/GitHubUploader.kt': `package com.winshop.musicclient.github

import android.util.Base64
import okhttp3.MediaType.Companion.toMediaType
import okhttp3.OkHttpClient
import okhttp3.Request
import okhttp3.RequestBody
import okhttp3.RequestBody.Companion.toRequestBody
import org.json.JSONObject
import java.io.File

/**
 * Minimal GitHub uploader using the Contents API.
 * Usage: create instance with token and call uploadFile(pathInRepo, file, commitMessage, branch)
 * NOTE: This is a simple implementation. For large binary files (>100MB) use Git LFS or a server.
 */
class GitHubUploader(private val owner: String, private val repo: String, private val token: String) {
    private val client = OkHttpClient()

    fun uploadFile(pathInRepo: String, file: File, commitMessage: String, branch: String = "tracks"): Boolean {
        val bytes = file.readBytes()
        val base64 = Base64.encodeToString(bytes, Base64.NO_WRAP)

        val json = JSONObject().apply {
            put("message", commitMessage)
            put("branch", branch)
            put("content", base64)
        }

        val mediaType = "application/json; charset=utf-8".toMediaType()
        val body: RequestBody = json.toString().toRequestBody(mediaType)

        val url = "https://api.github.com/repos/${owner}/${repo}/contents/${pathInRepo}"
        val req = Request.Builder()
            .url(url)
            .addHeader("Authorization", "token ${token}")
            .addHeader("Accept", "application/vnd.github+json")
            .put(body)
            .build()

        client.newCall(req).execute().use { resp ->
            return resp.isSuccessful
        }
    }
}
`
