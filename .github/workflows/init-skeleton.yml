name: Init skeleton

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Create branch and seed files (via github-script)
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.SKELETON_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'init-skeleton';

            // Ensure default branch SHA
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.default_branch;
            const { data: refData } = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
            const baseSha = refData.object.sha;

            // Create branch if not exists
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: baseSha });
              core = console;
              console.log(`Created branch ${branch}`);
            } catch (e) {
              if (e.status === 422) {
                console.log(`Branch ${branch} already exists`);
              } else {
                throw e;
              }
            }

            // Files to add to branch
            const files = [
              {
                path: 'README.md',
                content: `# music-client

Этот репозиторий содержит начальный скелет Android‑клиента для личных треков и инструкции.
- Хранение аудио: рекомендуется Git LFS.
- Загрузка: из клиента напрямую в ветку "tracks" (через GitHub API).
- Лицензия: MIT
`
              },
              {
                path: '.gitattributes',
                content: `*.mp3 filter=lfs diff=lfs merge=lfs -text
*.wav filter=lfs diff=lfs merge=lfs -text
`
              }
            ];

            // Helper: create or update file in the target branch
            for (const file of files) {
              const contentBase64 = Buffer.from(file.content, 'utf8').toString('base64');
              try {
                // check if file exists on the branch
                const existing = await github.rest.repos.getContent({
                  owner,
                  repo,
                  path: file.path,
                  ref: branch
                });
                // update
                await github.rest.repos.createOrUpdateFileContents({
                  owner,
                  repo,
                  path: file.path,
                  message: `Init: add ${file.path}`,
                  content: contentBase64,
                  branch,
                  sha: existing.data.sha
                });
                console.log(`Updated ${file.path} on ${branch}`);
              } catch (err) {
                if (err.status === 404) {
                  // create
                  await github.rest.repos.createOrUpdateFileContents({
                    owner,
                    repo,
                    path: file.path,
                    message: `Init: add ${file.path}`,
                    content: contentBase64,
                    branch
                  });
                  console.log(`Created ${file.path} on ${branch}`);
                } else {
                  throw err;
                }
              }
            }

            console.log('Seed files done.');
